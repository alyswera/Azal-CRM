<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة المتابعة الفورية للعمليات</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
    }
    .status-badge {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      display: inline-block;
      white-space: nowrap;
    }
    .badge-confirm { background: #dcfce7; color: #166534; }
    .badge-contacted { background: #dbeafe; color: #1d4ed8; }
    .badge-followup { background: #ede9fe; color: #6d28d9; }
    .badge-postponed { background: #fef3c7; color: #92400e; }
    .badge-closed { background: #e2e8f0; color: #334155; }
    .badge-noreply { background: #fee2e2; color: #b91c1c; }
  </style>
</head>
<body>
  <div class="min-h-screen">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-20">
      <div class="max-w-[1700px] mx-auto px-4 py-4 flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center text-xl">
            <i class="fa-solid fa-table-list"></i>
          </div>
          <div>
            <h1 class="text-2xl font-extrabold text-slate-900">لوحة المتابعة الفورية للعمليات</h1>
            <p class="text-sm text-slate-500">متابعة الحالات والملاحظات وتاريخ المتابعة</p>
          </div>
        </div>

        <button onclick="location.reload()" class="bg-red-50 text-red-600 hover:bg-red-100 border border-red-200 px-4 py-2 rounded-lg font-bold text-sm">
          <i class="fa-solid fa-rotate-right ml-1"></i>
          تحديث
        </button>
      </div>
    </header>

    <main class="max-w-[1700px] mx-auto p-4 space-y-6">
      <div class="card p-4">
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1">من:</label>
            <input type="date" id="date-from" class="w-full border rounded-lg p-2 bg-slate-50 focus:outline-emerald-500">
          </div>

          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1">إلى:</label>
            <input type="date" id="date-to" class="w-full border rounded-lg p-2 bg-slate-50 focus:outline-emerald-500">
          </div>

          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1">الحالة:</label>
            <select id="status-filter" class="w-full border rounded-lg p-2 bg-slate-50 focus:outline-emerald-500">
              <option value="ALL">كل الحالات</option>
              <option value="تأكيد الطلب">تأكيد الطلب</option>
              <option value="تم التواصل">تم التواصل</option>
              <option value="جاري المتابعة">جاري المتابعة</option>
              <option value="مؤجل">مؤجل</option>
              <option value="مغلق">مغلق</option>
              <option value="لا يرد">لا يرد</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1">كود الموظف:</label>
            <select id="emp-filter" class="w-full border rounded-lg p-2 bg-slate-50 focus:outline-emerald-500">
              <option value="ALL">كل الموظفين</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1">بحث:</label>
            <input type="text" id="search-input" placeholder="بحث باسم العميل أو الهاتف أو المنتج" class="w-full border rounded-lg p-2 bg-slate-50 focus:outline-emerald-500">
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div class="card p-4">
          <p class="text-sm text-slate-500">إجمالي السجلات</p>
          <h3 id="kpi-total" class="text-3xl font-extrabold text-slate-900">0</h3>
        </div>

        <div class="card p-4">
          <p class="text-sm text-slate-500">تأكيد الطلب</p>
          <h3 id="kpi-confirm" class="text-3xl font-extrabold text-green-600">0</h3>
        </div>

        <div class="card p-4">
          <p class="text-sm text-slate-500">جاري المتابعة</p>
          <h3 id="kpi-followup" class="text-3xl font-extrabold text-violet-600">0</h3>
        </div>

        <div class="card p-4">
          <p class="text-sm text-slate-500">مؤجل / لا يرد</p>
          <h3 id="kpi-pending" class="text-3xl font-extrabold text-amber-600">0</h3>
        </div>
      </div>

      <div class="card p-4">
        <div class="overflow-x-auto">
          <table class="w-full text-right border-collapse text-sm">
            <thead>
              <tr class="bg-slate-900 text-white">
                <th class="p-3 border">#</th>
                <th class="p-3 border">التاريخ</th>
                <th class="p-3 border">اسم العميل</th>
                <th class="p-3 border">رقم الهاتف</th>
                <th class="p-3 border">نوع المنتج</th>
                <th class="p-3 border">السعر</th>
                <th class="p-3 border">كود الموظف</th>
                <th class="p-3 border">الحالة</th>
                <th class="p-3 border">الملاحظات</th>
                <th class="p-3 border">تاريخ المتابعة القادم</th>
                <th class="p-3 border">إجراء</th>
              </tr>
            </thead>
            <tbody id="table-body" class="bg-white"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzpCXaJZDPM_QdmKKj0lNXETIcYoQssnqS7B0tQcHooQ9iWDHVijqqnjl6XPZ6EJld4ig/exec";
    const EMPLOYEE_CODES = ['CC01', 'CC02', 'CC03', 'CC04', 'CC05'];
    const STATUSES = ['تأكيد الطلب', 'تم التواصل', 'جاري المتابعة', 'مؤجل', 'مغلق', 'لا يرد'];

    let rawData = [];
    let filteredData = [];

    async function fetchFollowupData() {
      try {
        const response = await fetch(SCRIPT_URL + '?action=fetchFollowupBoardData');
        rawData = await response.json();

        rawData = rawData.map(item => ({
          rowIndex: Number(item.rowIndex || 0),
          date: item.date || '',
          customerName: String(item.customerName || '').trim(),
          phone: String(item.phone || '').trim(),
          productType: String(item.productType || '').trim(),
          price: normalizeNumber(item.price),
          employeeCode: String(item.employeeCode || '').trim().toUpperCase(),
          status: String(item.status || '').trim(),
          notes: String(item.notes || '').trim(),
          followUpDate: item.followUpDate || ''
        }));

        populateEmployeeFilter();
        initDateFilters();
        applyFilters();
      } catch (error) {
        console.error(error);
        document.getElementById('table-body').innerHTML = `
          <tr>
            <td colspan="11" class="p-6 text-center text-red-500 font-bold">
              فشل تحميل البيانات. تأكد من رابط الـ Apps Script وصلاحيات النشر.
            </td>
          </tr>
        `;
      }
    }

    function normalizeNumber(value) {
      if (typeof value === 'number') return value;
      const cleaned = String(value || '').replace(/[^\d.,-]/g, '').replace(/,/g, '');
      const num = parseFloat(cleaned);
      return isNaN(num) ? 0 : num;
    }

    function initDateFilters() {
      const today = new Date();
      const firstDayOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
      const offset = today.getTimezoneOffset() * 60000;

      document.getElementById('date-from').value = new Date(firstDayOfMonth.getTime() - offset).toISOString().split('T')[0];
      document.getElementById('date-to').value = new Date(today.getTime() - offset).toISOString().split('T')[0];
    }

    function populateEmployeeFilter() {
      const select = document.getElementById('emp-filter');
      select.innerHTML = '<option value="ALL">كل الموظفين</option>';

      EMPLOYEE_CODES.forEach(code => {
        const option = document.createElement('option');
        option.value = code;
        option.textContent = code;
        select.appendChild(option);
      });
    }

    function formatDateDisplay(value) {
      if (!value) return '';
      const d = new Date(value);
      if (isNaN(d.getTime())) return '';
      return d.toLocaleDateString('ar-EG');
    }

    function formatDateForInput(value) {
      if (!value) return '';
      const d = new Date(value);
      if (isNaN(d.getTime())) return '';
      const offset = d.getTimezoneOffset() * 60000;
      return new Date(d.getTime() - offset).toISOString().split('T')[0];
    }

    function getStatusBadge(status) {
      if (status === 'تأكيد الطلب') return 'status-badge badge-confirm';
      if (status === 'تم التواصل') return 'status-badge badge-contacted';
      if (status === 'جاري المتابعة') return 'status-badge badge-followup';
      if (status === 'مؤجل') return 'status-badge badge-postponed';
      if (status === 'مغلق') return 'status-badge badge-closed';
      if (status === 'لا يرد') return 'status-badge badge-noreply';
      return 'status-badge badge-followup';
    }

    function applyFilters() {
      const fromValue = document.getElementById('date-from').value;
      const toValue = document.getElementById('date-to').value;
      const statusValue = document.getElementById('status-filter').value;
      const empValue = document.getElementById('emp-filter').value;
      const searchValue = document.getElementById('search-input').value.trim().toLowerCase();

      const fromDate = fromValue ? new Date(fromValue) : null;
      const toDate = toValue ? new Date(toValue) : null;
      if (toDate) toDate.setHours(23, 59, 59, 999);

      filteredData = rawData.filter(item => {
        const d = new Date(item.date);
        if (!isNaN(d.getTime())) {
          if (fromDate && d < fromDate) return false;
          if (toDate && d > toDate) return false;
        }

        if (statusValue !== 'ALL' && item.status !== statusValue) return false;
        if (empValue !== 'ALL' && item.employeeCode !== empValue) return false;

        if (searchValue) {
          const haystack = [
            item.customerName,
            item.phone,
            item.productType,
            item.employeeCode,
            item.notes
          ].join(' ').toLowerCase();

          if (!haystack.includes(searchValue)) return false;
        }

        return true;
      });

      renderKPIs();
      renderTable();
    }

    function renderKPIs() {
      const total = filteredData.length;
      const confirm = filteredData.filter(item => item.status === 'تأكيد الطلب').length;
      const followup = filteredData.filter(item => item.status === 'جاري المتابعة').length;
      const pending = filteredData.filter(item => item.status === 'مؤجل' || item.status === 'لا يرد').length;

      document.getElementById('kpi-total').innerText = total.toLocaleString('ar-EG');
      document.getElementById('kpi-confirm').innerText = confirm.toLocaleString('ar-EG');
      document.getElementById('kpi-followup').innerText = followup.toLocaleString('ar-EG');
      document.getElementById('kpi-pending').innerText = pending.toLocaleString('ar-EG');
    }

    function renderTable() {
      const tbody = document.getElementById('table-body');

      if (!filteredData.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="11" class="p-6 text-center text-slate-400 font-bold">
              لا توجد بيانات مطابقة للفلاتر الحالية
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = filteredData.map((item, index) => `
        <tr class="border-b hover:bg-slate-50">
          <td class="p-2 border text-center font-bold">${index + 1}</td>
          <td class="p-2 border text-center">${formatDateDisplay(item.date)}</td>
          <td class="p-2 border font-bold">${item.customerName || '-'}</td>
          <td class="p-2 border">${item.phone || '-'}</td>
          <td class="p-2 border">
            <span class="inline-block px-2 py-1 rounded bg-emerald-50 text-emerald-700 text-xs font-bold">
              ${item.productType || '-'}
            </span>
          </td>
          <td class="p-2 border font-bold text-emerald-600">${(item.price || 0).toLocaleString('ar-EG')} ج.م</td>
          <td class="p-2 border font-bold text-sky-700">${item.employeeCode || '-'}</td>
          <td class="p-2 border">
            <select id="status-${item.rowIndex}" class="w-full border rounded-lg p-2 bg-white text-sm">
              ${STATUSES.map(status => `<option value="${status}" ${item.status === status ? 'selected' : ''}>${status}</option>`).join('')}
            </select>
          </td>
          <td class="p-2 border">
            <input id="notes-${item.rowIndex}" type="text" value="${escapeHtml(item.notes || '')}" placeholder="اكتب ملاحظاتك الحالية..." class="w-full border rounded-lg p-2 bg-slate-50 text-sm">
          </td>
          <td class="p-2 border">
            <input id="followup-${item.rowIndex}" type="date" value="${formatDateForInput(item.followUpDate)}" class="w-full border rounded-lg p-2 bg-slate-50 text-sm">
          </td>
          <td class="p-2 border text-center">
            <button onclick="saveRow(${item.rowIndex})" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-bold">
              <i class="fa-solid fa-floppy-disk ml-1"></i>
              حفظ
            </button>
          </td>
        </tr>
      `).join('');
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    async function saveRow(rowIndex) {
      const notes = document.getElementById(`notes-${rowIndex}`).value || '';
      const status = document.getElementById(`status-${rowIndex}`).value || '';
      const followUpDate = document.getElementById(`followup-${rowIndex}`).value || '';

      try {
        const body = new URLSearchParams();
        body.append('action', 'updateFollowupRow');
        body.append('rowIndex', String(rowIndex));
        body.append('notes', notes);
        body.append('status', status);
        body.append('followUpDate', followUpDate);

        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'cors',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
          },
          body: body.toString()
        });

        const result = await response.json();

        if (!result || result.status !== 'success') {
          throw new Error(result?.message || 'Update failed');
        }

        const target = rawData.find(item => item.rowIndex === Number(rowIndex));
        if (target) {
          target.notes = notes;
          target.status = status;
          target.followUpDate = followUpDate;
        }

        applyFilters();
        alert('تم حفظ التعديلات بنجاح');
      } catch (error) {
        console.error(error);
        alert('تعذر حفظ التعديلات. تأكد من رابط الـ Apps Script وصلاحيات النشر.');
      }
    }

    document.getElementById('date-from').addEventListener('change', applyFilters);
    document.getElementById('date-to').addEventListener('change', applyFilters);
    document.getElementById('status-filter').addEventListener('change', applyFilters);
    document.getElementById('emp-filter').addEventListener('change', applyFilters);
    document.getElementById('search-input').addEventListener('input', applyFilters);

    window.onload = fetchFollowupData;
  </script>
</body>
</html>
